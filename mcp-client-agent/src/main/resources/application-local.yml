# Local Profile - H2 内存数据库配置
spring:
  datasource:
    url: jdbc:h2:mem:mcp_client_agent;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.example.mcp.client: DEBUG
    com.hhx.agi: DEBUG
    org.springframework.ai: INFO
    io.modelcontextprotocol: DEBUG
