server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILE:local}
  autoconfigure:
    exclude:
      - org.springframework.ai.mcp.client.autoconfigure.McpClientAutoConfiguration
      - org.springframework.ai.mcp.client.autoconfigure.McpToolCallbackAutoConfiguration
      - org.springframework.ai.mcp.client.autoconfigure.SseHttpClientTransportAutoConfiguration
      - org.springframework.ai.mcp.client.autoconfigure.SseWebFluxTransportAutoConfiguration
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:xxx}
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      chat:
        completions-path: /chat/completions
        options:
          model: ${OPENAI_MODEL:MiniMax-M2.5}
          temperature: 0.3
          max-tokens: 4096
      embedding:
        enabled: ${EMBEDDING_ENABLED:true}
        options:
          model: ${EMBEDDING_MODEL:text-embedding-v3}

    # MCP Client 配置
    mcp:
      client:
        request-timeout: 30s

# 自管理的 MCP Server 连接列表（McpConnectionManager 读取）
mcp:
  servers: "{'business-server': 'http://localhost:9081', 'weather-server': 'http://localhost:9082'}"

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.hhx.agi.infra.po
  global-config:
    db-config:
      id-type: auto
