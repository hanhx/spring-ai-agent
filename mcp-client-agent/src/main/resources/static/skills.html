<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill 管理</title>
    <style>
        /* Dark theme (default) */
        [data-theme="dark"] {
            --bg-main: #212121;
            --bg-card: #2f2f2f;
            --bg-input: #3a3a3a;
            --text-primary: #ececec;
            --text-secondary: #b4b4b4;
            --text-muted: #8e8e8e;
            --accent: #10a37f;
            --accent-hover: #1a7f64;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --border: #3e3e3e;
        }

        /* Light theme */
        [data-theme="light"] {
            --bg-main: #ffffff;
            --bg-card: #f7f7f8;
            --bg-input: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-muted: #999999;
            --accent: #10a37f;
            --accent-hover: #1a7f64;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --border: #e5e5e5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 24px;
            transition: background 0.3s, color 0.3s;
        }

        :root {
            --radius: 8px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover { background: var(--accent-hover); }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: var(--bg-input); }

        .btn-danger {
            background: var(--danger);
            color: white;
        }
        .btn-danger:hover { background: var(--danger-hover); }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* Skill Grid */
        .skill-grid {
            display: grid;
            gap: 16px;
        }

        .skill-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 16px;
            border: 1px solid var(--border);
        }

        .skill-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .skill-name {
            font-size: 18px;
            font-weight: 600;
        }

        .skill-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-enabled {
            background: rgba(16, 163, 127, 0.2);
            color: #10a37f;
        }

        .badge-disabled {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .badge-vector {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .skill-description {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .skill-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .skill-tools {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .tool-tag {
            background: var(--bg-input);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .skill-actions {
            display: flex;
            gap: 8px;
            border-top: 1px solid var(--border);
            padding-top: 12px;
            margin-top: 12px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 {
            margin-bottom: 20px;
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
            font-family: monospace;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        /* Test Match Section */
        .test-section {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            margin-top: 24px;
            border: 1px solid var(--border);
        }

        .test-section h3 {
            margin-bottom: 16px;
            font-size: 18px;
        }

        .test-input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .test-input-group input {
            flex: 1;
            padding: 10px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 14px;
        }

        .test-results {
            background: var(--bg-main);
            border-radius: var(--radius);
            padding: 16px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-name {
            font-weight: 500;
        }

        .result-score {
            color: var(--accent);
            font-family: monospace;
        }

        .result-method {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-input);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>Skill 管理</span>
            <a href="/" style="font-size: 14px; color: var(--text-muted); text-decoration: none;">返回聊天</a>
        </h1>

        <div class="toolbar">
            <button class="btn btn-primary" onclick="openCreateModal()">+ 新建 Skill</button>
            <button class="btn btn-secondary" onclick="refreshIndex()">刷新索引</button>
            <button class="btn btn-secondary" onclick="regenerateVectors()">重新生成向量</button>
        </div>

        <div id="skillGrid" class="skill-grid">
            <!-- Skills will be rendered here -->
        </div>

        <div class="test-section">
            <h3>向量匹配测试</h3>
            <div class="test-input-group">
                <input type="text" id="testQuery" placeholder="输入测试查询，如：帮我写一个排序算法">
                <button class="btn btn-primary" onclick="testMatch()">测试匹配</button>
            </div>
            <div id="testResults" class="test-results hidden">
                <!-- Results will be rendered here -->
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal">
            <h2 id="modalTitle">新建 Skill</h2>
            <form id="skillForm">
                <input type="hidden" id="skillId">
                <div class="form-group">
                    <label for="name">名称 *</label>
                    <input type="text" id="name" required placeholder="如：code_review">
                </div>
                <div class="form-group">
                    <label for="description">描述</label>
                    <textarea id="description" placeholder="Skill 的功能描述，用于向量匹配"></textarea>
                </div>
                <div class="form-group">
                    <label for="allowedTools">允许的工具（逗号分隔）</label>
                    <input type="text" id="allowedTools" placeholder="如：search,execute_code,read_file">
                </div>
                <div class="form-group">
                    <label for="promptBody">Prompt 模板</label>
                    <textarea id="promptBody" placeholder="System prompt，支持 Markdown"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="priority">优先级</label>
                        <input type="number" id="priority" value="0">
                    </div>
                    <div class="form-group">
                        <label for="enabled">状态</label>
                        <select id="enabled">
                            <option value="true">启用</option>
                            <option value="false">禁用</option>
                        </select>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let skills = [];

        // Load skills on page load
        async function loadSkills() {
            try {
                const res = await fetch('/api/skills');
                skills = await res.json();
                renderSkills();
            } catch (e) {
                console.error('Failed to load skills:', e);
            }
        }

        function renderSkills() {
            const grid = document.getElementById('skillGrid');
            grid.innerHTML = skills.map(skill => `
                <div class="skill-card">
                    <div class="skill-header">
                        <div class="skill-name">${escapeHtml(skill.name)}</div>
                        <div class="skill-status">
                            ${skill.vector ? '<span class="badge badge-vector">已向量化</span>' : ''}
                            <span class="badge ${skill.enabled ? 'badge-enabled' : 'badge-disabled'}">
                                ${skill.enabled ? '启用' : '禁用'}
                            </span>
                        </div>
                    </div>
                    <div class="skill-description">${escapeHtml(skill.description || '暂无描述')}</div>
                    <div class="skill-meta">
                        <span>优先级: ${skill.priority}</span>
                        <span>ID: ${skill.id}</span>
                    </div>
                    ${skill.allowedTools ? `
                        <div class="skill-tools">
                            ${skill.allowedTools.split(/[,\s]+/).filter(t => t).map(t =>
                                `<span class="tool-tag">${escapeHtml(t)}</span>`
                            ).join('')}
                        </div>
                    ` : ''}
                    <div class="skill-actions">
                        <button class="btn btn-secondary btn-sm" onclick="openEditModal(${skill.id})">编辑</button>
                        <button class="btn btn-secondary btn-sm" onclick="toggleEnabled(${skill.id})">
                            ${skill.enabled ? '禁用' : '启用'}
                        </button>
                        <button class="btn btn-danger btn-sm" onclick="deleteSkill(${skill.id})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Modal functions
        function openCreateModal() {
            document.getElementById('modalTitle').textContent = '新建 Skill';
            document.getElementById('skillForm').reset();
            document.getElementById('skillId').value = '';
            document.getElementById('modalOverlay').classList.remove('hidden');
        }

        function openEditModal(id) {
            const skill = skills.find(s => s.id === id);
            if (!skill) return;

            document.getElementById('modalTitle').textContent = '编辑 Skill';
            document.getElementById('skillId').value = skill.id;
            document.getElementById('name').value = skill.name;
            document.getElementById('description').value = skill.description || '';
            document.getElementById('allowedTools').value = skill.allowedTools || '';
            document.getElementById('promptBody').value = skill.promptBody || '';
            document.getElementById('priority').value = skill.priority;
            document.getElementById('enabled').value = skill.enabled ? 'true' : 'false';
            document.getElementById('modalOverlay').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
        }

        // Form submit
        document.getElementById('skillForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('skillId').value;
            const data = {
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                allowedTools: document.getElementById('allowedTools').value,
                promptBody: document.getElementById('promptBody').value,
                priority: parseInt(document.getElementById('priority').value) || 0,
                enabled: document.getElementById('enabled').value === 'true'
            };

            try {
                const url = id ? `/api/skills/${id}` : '/api/skills';
                const method = id ? 'PUT' : 'POST';
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    closeModal();
                    loadSkills();
                } else {
                    alert('保存失败');
                }
            } catch (e) {
                alert('保存失败: ' + e.message);
            }
        });

        // Actions
        async function toggleEnabled(id) {
            try {
                const res = await fetch(`/api/skills/${id}/toggle`, { method: 'POST' });
                if (res.ok) {
                    loadSkills();
                }
            } catch (e) {
                alert('操作失败');
            }
        }

        async function deleteSkill(id) {
            if (!confirm('确定要删除这个 Skill 吗？')) return;
            try {
                const res = await fetch(`/api/skills/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    loadSkills();
                }
            } catch (e) {
                alert('删除失败');
            }
        }

        async function refreshIndex() {
            try {
                const res = await fetch('/api/skills/refresh', { method: 'POST' });
                const data = await res.json();
                alert(data.message || '刷新成功');
            } catch (e) {
                alert('刷新失败: ' + e.message);
            }
        }

        async function regenerateVectors() {
            if (!confirm('确定要重新生成所有向量吗？这可能需要一些时间。')) return;
            try {
                const res = await fetch('/api/skills/regenerate-vectors', { method: 'POST' });
                const data = await res.json();
                alert(data.message || '生成成功');
                loadSkills();
            } catch (e) {
                alert('生成失败: ' + e.message);
            }
        }

        async function testMatch() {
            const query = document.getElementById('testQuery').value;
            if (!query) return;

            try {
                const res = await fetch('/api/skills/test-match', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, topK: 5 })
                });
                const data = await res.json();

                const resultsDiv = document.getElementById('testResults');
                resultsDiv.classList.remove('hidden');
                resultsDiv.innerHTML = data.results.map(r => `
                    <div class="result-item">
                        <div>
                            <span class="result-name">${escapeHtml(r.name)}</span>
                            <span class="result-method">${r.method}</span>
                        </div>
                        <span class="result-score">${r.score.toFixed(4)}</span>
                    </div>
                `).join('');
            } catch (e) {
                alert('测试失败: ' + e.message);
            }
        }

        // Initialize
        loadSkills();
    </script>
</body>
</html>
