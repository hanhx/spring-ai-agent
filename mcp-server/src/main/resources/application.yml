server:
  port: 9081

spring:
  profiles:
    active: ${SPRING_PROFILE:local}

  ai:
    mcp:
      server:
        name: business-mcp-server
        version: 1.0.0
        type: SYNC
        # 使用 SSE 协议（与 client 的 SSE 配置一致）
        protocol: SSE

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

logging:
  level:
    com.example.mcp: DEBUG
    io.modelcontextprotocol: DEBUG
